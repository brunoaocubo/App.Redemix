<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Center - Check Vendas</title>  
    <link rel="shortcut icon" href="../imagens/favicon.png" type="image/png">
    <link rel="stylesheet" href="../css/root.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/checksales.css">
    <link rel="stylesheet" href="../css/nav.css">
</head>
<body>
    <div id="nav-placeholder"></div>
    <main>
        <header>
            <img src="../imagens/icons/vendas_icon.png" alt="Pricer - Etiquetas" class="icon">
            <h2 class="main-title">Check Vendas</h2>
        </header>
        <section class="content flex-col">
            <div class="main-summary">
                <button class="button_model" id="calendar">
                    <img src="../imagens/icons/calendar_icon.svg" alt="Calendário" class="icon">
                </button>
                <p>
                    <span class="dayweek">Dia-Feira</span>,
                    <span class="fulldate">27/02/2026</span>
                </p>
                <div class="container-button-action flex-row">
                    <button class="type-button-action" id="update"><img src="../imagens/icons/reload_icon.svg" alt="Reload" class="icon">Atualizar</button>
                    <button class="type-button-action" id="download"><img src="../imagens/icons/download_icon.svg" alt="Download" class="icon"> Exportar</button>
                </div>
            </div>
            <section class="container-filter shadow-box border-content flex-col" data-isactive="false">
                <div class="container-type-search flex-row">
                    <button class="type-search" id="toggle-day" data-isactive="true">Dia</button>
                    <button class="type-search" id="toggle-period" data-isactive="false">Período</button>
                </div>
                <div class="container-date-filter flex-row">
                    <form action="#" class="flex-row">
                        <div class="date" data-isactive="true">
                            <input type="date" id="firstdate" value="2026-02-18">
                        </div>
                        <div class="date shadow-box" data-isactive="false">
                            <input type="date" id="seconddate" value="2026-02-18">
                        </div>
                    </form>
                    <button class="button_model" id="search">
                        <img src="../imagens/icons/search.icon.svg" alt="Procurar" class="icon">
                    </button>
                </div>
            </section>
            <section class="list-itens flex-col shadow-box border-content">
                <h3 class="color-primary">LOJAS</h3>
                <template id="template-card-market">
                    <details class="item flex-col shadow-box border-content">
                        <summary class="market-summary-grid">
                            <div class="market">
                                <span>13.2 - IMBUI</span>
                                <div class="container-delivery">
                                    <div id="delivery" class="group-delivery flex-row">
                                        <dt>Delivery:</dt>
                                        <dd>0.000,00</dd>
                                    </div>
                                    <div id="delivery-sales" class="group-delivery flex-row">
                                        <dt>Venda:</dt>
                                        <dd>0000</dd>
                                    </div>
                                </div>
                            </div>
                            <dl class="total-cupons flex-col">
                                <dt>Vendas:</dt>
                                <dd>0000</dd>
                            </dl>
                            <dl class="digit flex-col">
                                <dt>Digitada:</dt>
                                <dd>R$ 000.000,00</dd>
                            </dl>
                            <dl class="total-pdv flex-col">
                                <dt>Pdv:</dt>
                                <dd>R$ 000.000,00</dd>
                            </dl>
                            <dl class="socin flex-col">
                                <dt>Socin:</dt>
                                <dd>R$ 000.000,00</dd>
                            </dl>
                            <dl class="rms flex-col">
                                <dt>Rms:</dt>
                                <dd>R$ 000.000,00</dd>
                            </dl>
                            <dl class="imported flex-col">
                                <dt>Importada:</dt>
                                <dd>R$ 000.000,00</dd>
                            </dl>
                            <dl class="inovar flex-col">
                                <dt>Inovar:</dt>
                                <dd>R$ 000.000,00</dd>
                            </dl>
                            <dl class="gerencial flex-col">
                                <dt>Gerencial:</dt>
                                <dd>R$ 000.000,00</dd>
                            </dl>
                        </summary>
                    
                        <div class="container-itens-pdv flex-col border-content color-seccondary">
                            <h3>PDV</h3>
                            <div class="list-itens-pdv flex-row">
                                <template id="template-pdv">
                                    <details>
                                        <summary class="pdv-summary-grid">
                                            <dl class="pdv flex-row">
                                                <dt>
                                                    <img src="../imagens/icons/pdv_icon.svg" class="icon">
                                                </dt>
                                                <dd>33</dd>
                                            </dl>
                                            <dl>
                                                <dt>Digitada:</dt>
                                                <dd>R$ 000.000,00</dd>
                                            </dl>
                                            <dl>
                                                <dt>Pdv:</dt>
                                                <dd>R$ 000.000,00</dd>
                                            </dl>
                                            <dl>
                                                <dt>Socin:</dt>
                                                <dd>R$ 000.000,00</dd>
                                            </dl>
                                        </summary>
                                        <div class="container-itens-hour flex-col color-seccondary">
                                            <h3>VENDAS POR HORA</h3>
                                            <div class="list-itens-hour flex-row">
                                                <dl class="item-hour flex-col shadow-box border-content">
                                                    <dt>6H</dt>
                                                    <hr>
                                                    <dd>1.120,16</dd>
                                                </dl>
                                                <dl class="item-hour flex-col shadow-box border-content">
                                                    <dt>6H</dt>
                                                    <hr>
                                                    <dd>1.120,16</dd>
                                                </dl>
                                                <dl class="item-hour flex-col shadow-box border-content">
                                                    <dt>6H</dt>
                                                    <hr>
                                                    <dd>1.120,16</dd>
                                                </dl>
                                                <dl class="item-hour flex-col shadow-box border-content">
                                                    <dt>6H</dt>
                                                    <hr>
                                                    <dd>1.120,16</dd>
                                                </dl>
                                                <dl class="item-hour flex-col shadow-box border-content">
                                                    <dt>6H</dt>
                                                    <hr>
                                                    <dd>1.120,16</dd>
                                                </dl>
                                                <dl class="item-hour flex-col shadow-box border-content">
                                                    <dt>6H</dt>
                                                    <hr>
                                                    <dd>1.120,16</dd>
                                                </dl>
                                            </div>
                                        </div>
                                    </details>
                                </template>
                            </div>
                        </div>
                    </details>
                </template>
            </section>
            <dl class="container-total flex-col">
                <dt class="medium-text">Total:</dt>
                <dd>R$ 0.000.000,00</dd>
            </dl>
        </section>
    </main>
    <script src="../js/nav.js"></script>
    <script type="module" src="../js/logoutObserver.js"></script>
    <script type="module" src="../js/checksales.js"></script>
    <script type="module" src="../js/api.js"></script>
</body>
</html>
