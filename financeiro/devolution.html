<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Center - Extra Fornecedor</title>  
    <link rel="shortcut icon" href="../imagens/favicon.png" type="image/png">
    <link rel="stylesheet" href="../css/devolution.css">
    <link rel="stylesheet" href="../css/root.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/nav.css">
</head>
<body>
    <div id="nav-placeholder"></div>
    <main>
        <header>
            <img src="../imagens/icons/note_icon.png" alt="Extra Fornecedor" class="icon">
            <h2 class="main-title">Extra Fornecedor</h2>
        </header>
        <section class="content">
            <div class="header">
                <h3>Lista de Emails:</h3>
                <button id="btn-add-email"><img src="../imagens/icons/email_check_icon.svg" alt="Lista de Emails" class="icon"></button>
                <div id="container-new-email" data-isactive="true">
                    <img src="../imagens/icons/email_icon.svg" alt="">
                    <label for="newemail">Email:</label>
                    <input type="email" id="newemail">
                    <button class="save-new-email"><img src="../imagens/icons/disk_icon.svg" alt="" class="icon"> Salvar</button>
                    <button class="close-container">X</button>
                </div>
            </div>
            <section class="container-list-emails">
                <template id="template-email-user">
                    <div class="container-email-user">
                        <img src="../imagens/icons/email_icon_beige.svg" alt="Email" class="icon">
                        <div>
                            <h5>Admin</h5>
                            <p>admin@redemix.com.br</p>
                        </div>
                        <button><img src="../imagens/icons/trash_icon_red.svg" alt="Remover Email da Lista" class="icon"></button>
                    </div>
                </template>
                    <div class="email-user">
                        <img src="../imagens/icons/email_icon_beige.svg" alt="Email" class="icon">
                        <div>
                            <h5>Admin</h5>
                            <p>admin@redemix.com.br</p>
                        </div>
                        <button class="delete-email"><img src="../imagens/icons/trash_icon_red.svg" alt="Remover E-mail da Lista" class="icon"></button>
                    </div>
            </section>
            <div class="container-actions">
                <button class="delete-notes"><img src="../imagens/icons/trash_icon.svg" alt="Remover Notas" class="icon">Remover Notas</button>
                <button class="start-process"><img src="../imagens/icons/play_icon.svg" alt="Executar" class="icon">Executar</button>
            </div>
        </section>
    </main>
    <script src="../js/nav.js"></script>
    <script type="module" src="../js/logoutObserver.js"></script>
</body>
</html>
